spring:
  application:
    name: LMS_BACKEND
  profiles:
    active: dev

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8888}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:uploads}
  region: ${MINIO_REGION:us-east-1}

tus:
  max-upload-size-bytes: ${TUS_MAX_UPLOAD_SIZE_BYTES:10737418240}
  chunk-cleanup-on-complete: ${TUS_CHUNK_CLEANUP_ON_COMPLETE:true}

rate-limit:
  defaultLimit:
    capacity: 100
    refill: 100
    duration: 60
  endpointLimits:
    "[ /api/auth/** ]":
      capacity: 5
      refill: 5
      duration: 60
    "[ /api/admin/** ]":
      capacity: 20
      refill: 20
      duration: 60
  userLimits:
    "[ admin@example.com ]":
      capacity: 1000
      refill: 1000
      duration: 60
  ipLimits:
    "[ 127.0.0.1 ]":
      capacity: 500
      refill: 500
      duration: 60
